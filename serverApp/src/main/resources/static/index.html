<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTT-LAN Admin Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-color: #4C9EEB;
            --text-color: #E0E0E0;
            --text-muted: #9E9E9E;
            --success-color: #4CAF50;
            --speaking-color: #C77D4C;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .channels-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
        }

        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
        }

        .channel-count {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: var(--success-color);
        }

        .status-dot.speaking {
            background-color: var(--speaking-color);
            box-shadow: 0 0 8px var(--speaking-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            background-color: var(--surface-color);
            border-radius: 8px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        .logs-container {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-muted);
            min-width: 70px;
            font-variant-numeric: tabular-nums;
        }

        .log-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 10px;
            text-transform: uppercase;
        }

        .badge-join { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .badge-leave { background-color: rgba(244, 67, 54, 0.2); color: #F44336; }
        .badge-speak { background-color: rgba(199, 125, 76, 0.2); color: var(--speaking-color); }
        .badge-stop { background-color: rgba(158, 158, 158, 0.2); color: #9E9E9E; }
    </style>
</head>
<body>
    <header>
        <h1>PTT-LAN Admin Dashboard</h1>
        <div id="last-updated" style="color: var(--text-muted); font-size: 14px;">Atualizado: --:--:--</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="global-connections">0</div>
            <div class="stat-label">Conexões Globais</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="active-channels-count">0</div>
            <div class="stat-label">Canais Ativos</div>
        </div>
    </div>

    <div class="dashboard-layout">
        <div>
            <h2>Canais Ativos</h2>
            <div id="channels-container" class="channels-container">
                <!-- Canais serão inseridos aqui via JS -->
            </div>
        </div>
        
        <div>
            <h2>Atividade Recente</h2>
            <div id="logs-container" class="logs-container">
                <!-- Logs serão inseridos aqui via JS -->
                <div class="empty-state" style="padding: 20px;">Aguardando eventos...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/admin/metrics', { cache: 'no-store' });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('global-connections').textContent = data.globalConnections;
                document.getElementById('active-channels-count').textContent = data.channels.length;
                
                const now = new Date();
                document.getElementById('last-updated').textContent = `Atualizado: ${now.toLocaleTimeString()}`;
                
                renderChannels(data.channels);
                renderLogs(data.logs || []);
            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        function renderChannels(channels) {
            const container = document.getElementById('channels-container');
            
            if (channels.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum canal ativo no momento.</div>';
                return;
            }
            
            container.innerHTML = channels.map(channel => `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-name">Canal ${channel.id}</div>
                        <div class="channel-count">${channel.participantCount} users</div>
                    </div>
                    <ul class="participant-list">
                        ${channel.participants.map(p => `
                            <li class="participant-item">
                                <div class="status-dot ${p.isSpeaking ? 'speaking' : ''}"></div>
                                <span>${p.nickname}</span>
                                ${p.isSpeaking ? '<span style="margin-left: 8px; font-size: 12px; color: var(--speaking-color);">(Falando)</span>' : ''}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            
            if (!logs || logs.length === 0) {
                return;
            }

            container.innerHTML = logs.map(log => {
                const date = new Date(log.timestamp);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                let badgeClass = '';
                let label = '';
                let actionText = '';

                switch(log.eventType) {
                    case 'JOIN':
                        badgeClass = 'badge-join'; label = 'Entrou'; actionText = 'entrou no canal'; break;
                    case 'LEAVE':
                        badgeClass = 'badge-leave'; label = 'Saiu'; actionText = 'saiu do canal'; break;
                    case 'START_SPEAKING':
                        badgeClass = 'badge-speak'; label = 'Falando'; actionText = 'começou a transmitir no canal'; break;
                    case 'STOP_SPEAKING':
                        badgeClass = 'badge-stop'; label = 'Parou'; actionText = 'parou de transmitir no canal'; break;
                    default:
                        badgeClass = 'badge-stop'; label = log.eventType; actionText = 'fez algo no canal'; break;
                }

                return `
                    <div class="log-item">
                        <div class="log-time">${timeStr}</div>
                        <div class="log-badge ${badgeClass}">${label}</div>
                        <div>
                            <strong>${log.participantName}</strong> ${actionText} <strong>${log.channelId}</strong>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Poll a cada 2 segundos
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>
</html>
