<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTT-LAN Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-color: #4C9EEB;
            --text-color: #E0E0E0;
            --text-muted: #9E9E9E;
            --success-color: #4CAF50;
            --speaking-color: #C77D4C;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .channels-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
        }

        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
        }

        .channel-count {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: var(--success-color);
        }

        .status-dot.speaking {
            background-color: var(--speaking-color);
            box-shadow: 0 0 8px var(--speaking-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            background-color: var(--surface-color);
            border-radius: 8px;
        }

        .dashboard-layout {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .logs-container {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-muted);
            min-width: 70px;
            font-variant-numeric: tabular-nums;
        }

        .log-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 10px;
            text-transform: uppercase;
        }

        .badge-join { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .badge-leave { background-color: rgba(244, 67, 54, 0.2); color: #F44336; }
        .badge-speak { background-color: rgba(199, 125, 76, 0.2); color: var(--speaking-color); }
        .badge-stop { background-color: rgba(158, 158, 158, 0.2); color: #9E9E9E; }
    </style>
</head>
<body>
    <header>
        <h1>PTT-LAN Admin Dashboard</h1>
        <div id="last-updated" style="color: var(--text-muted); font-size: 14px;">Atualizado: --:--:--</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="global-connections">0</div>
            <div class="stat-label">Conexões Globais</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="active-channels-count">0</div>
            <div class="stat-label">Canais Ativos</div>
        </div>
    </div>

    <div class="dashboard-layout">
        <div>
            <h2 style="margin-top: 0;">Canais Ativos</h2>
            <div id="channels-container" class="channels-container">
                <!-- Canais serão inseridos aqui via JS -->
            </div>
        </div>
        
        <div>
            <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px;">
                <div>
                    <h2 style="margin-top: 0;">Quem Fala Mais (Seg)</h2>
                    <div class="stat-card" style="height: 300px; position: relative;">
                        <canvas id="speakerChart"></canvas>
                    </div>
                </div>
                <div>
                    <h2 style="margin-top: 0;">Distribuição por Canal</h2>
                    <div class="stat-card" style="height: 300px; position: relative;">
                        <canvas id="channelParticipantsChart"></canvas>
                    </div>
                </div>
            </div>

            <h2 style="margin-top: 0;">Monitoramento de Rede e Uso</h2>
            <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                <div class="stat-card" style="padding: 10px; height: 250px; position: relative;">
                    <h3 style="margin-top: 0; font-size: 14px; text-align: center;">Tráfego de Áudio (Bytes)</h3>
                    <canvas id="bandwidthChart"></canvas>
                </div>
                <div class="stat-card" style="padding: 10px; height: 250px; position: relative;">
                    <h3 style="margin-top: 0; font-size: 14px; text-align: center;">Atividade PTT (Por Min)</h3>
                    <canvas id="pttFrequencyChart"></canvas>
                </div>
                <div class="stat-card" style="padding: 10px; height: 250px; position: relative;">
                    <h3 style="margin-top: 0; font-size: 14px; text-align: center;">Atrasos de Rede</h3>
                    <canvas id="networkDelaysChart"></canvas>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="margin: 0;">Atividade Recente</h2>
                <select id="log-channel-filter" style="padding: 5px 10px; border-radius: 4px; background: var(--card-bg); color: var(--text-color); border: 1px solid #444; font-family: inherit;">
                    <option value="ALL">Todos os Canais</option>
                </select>
            </div>
            <div id="logs-container" class="logs-container">
                <!-- Logs serão inseridos aqui via JS -->
                <div class="empty-state" style="padding: 20px;">Aguardando eventos...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/admin/metrics', { cache: 'no-store' });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('global-connections').textContent = data.globalConnections;
                document.getElementById('active-channels-count').textContent = data.channels.length;
                
                const now = new Date();
                document.getElementById('last-updated').textContent = `Atualizado: ${now.toLocaleTimeString()}`;
                
                window.lastLogs = data.logs || [];
                updateChannelFilter(data.channels || []);
                renderChannels(data.channels || []);
                renderLogs();
                renderSpeakerChart(data.speakerTimes || []);
                renderChannelParticipantsChart(data.channels || []);
                renderTimeSeriesCharts(data.timeSeries || []);
            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        function updateChannelFilter(channels) {
            const select = document.getElementById('log-channel-filter');
            const currentValue = select.value;
            select.innerHTML = '<option value="ALL">Todos os Canais</option>' + 
                channels.map(c => `<option value="${c.id}" ${currentValue === c.id ? 'selected' : ''}>Canal ${c.id}</option>`).join('');
        }

        document.getElementById('log-channel-filter').addEventListener('change', () => {
            renderLogs();
        });

        function renderChannels(channels) {
            const container = document.getElementById('channels-container');
            if (!channels || channels.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum canal ativo no momento.</div>';
                return;
            }
            
            container.innerHTML = channels.map(channel => `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-name">Canal ${channel.id}</div>
                        <div class="channel-count">${channel.participantCount} users</div>
                    </div>
                    <ul class="participant-list">
                        ${channel.participants.map(p => `
                            <li class="participant-item">
                                <div class="status-dot ${p.isSpeaking ? 'speaking' : ''}"></div>
                                <span>${p.nickname}</span>
                                ${p.isSpeaking ? '<span style="margin-left: 8px; font-size: 12px; color: var(--speaking-color);">(Falando)</span>' : ''}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function renderLogs() {
            const container = document.getElementById('logs-container');
            const filterValue = document.getElementById('log-channel-filter').value;
            const logs = window.lastLogs || [];
            
            const filteredLogs = filterValue === 'ALL' ? logs : logs.filter(l => l.channelId === filterValue);
            
            if (filteredLogs.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma atividade recente.</div>';
                return;
            }

            container.innerHTML = filteredLogs.map(log => {
                const date = new Date(log.timestamp);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                let badgeClass = '';
                let label = '';
                let actionText = '';

                switch(log.eventType) {
                    case 'JOIN':
                        badgeClass = 'badge-join'; label = 'Entrou'; actionText = 'entrou no canal'; break;
                    case 'LEAVE':
                        badgeClass = 'badge-leave'; label = 'Saiu'; actionText = 'saiu do canal'; break;
                    case 'START_SPEAKING':
                        badgeClass = 'badge-speak'; label = 'Falando'; actionText = 'começou a transmitir no canal'; break;
                    case 'STOP_SPEAKING':
                        badgeClass = 'badge-stop'; label = 'Parou'; actionText = 'parou de transmitir no canal'; break;
                    default:
                        badgeClass = 'badge-stop'; label = log.eventType; actionText = 'fez algo no canal'; break;
                }

                return `
                    <div class="log-item">
                        <div class="log-time">${timeStr}</div>
                        <div class="log-badge ${badgeClass}">${label}</div>
                        <div>
                            <strong>${log.participantName}</strong> ${actionText} <strong>${log.channelId}</strong>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let speakerChartInstance = null;
        let channelParticipantsChartInstance = null;
        let bandwidthChartInstance = null;
        let pttFrequencyChartInstance = null;
        let networkDelaysChartInstance = null;

        function renderSpeakerChart(speakerTimes) {
            const ctx = document.getElementById('speakerChart');
            if (!ctx) return;

            const sorted = [...speakerTimes].sort((a, b) => b.totalTimeSeconds - a.totalTimeSeconds);
            const labels = sorted.map(s => s.nickname);
            const data = sorted.map(s => s.totalTimeSeconds);

            if (speakerChartInstance) {
                speakerChartInstance.data.labels = labels;
                speakerChartInstance.data.datasets[0].data = data;
                speakerChartInstance.update();
            } else {
                speakerChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Segundos',
                            data: data,
                            backgroundColor: 'rgba(76, 158, 235, 0.6)',
                            borderColor: '#4C9EEB',
                            borderWidth: 1
                        }]
                    },
                    options: { maintainAspectRatio: false, responsive: true, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                });
            }
        }

        function renderChannelParticipantsChart(channels) {
            const ctx = document.getElementById('channelParticipantsChart');
            if (!ctx) return;

            const labels = channels.map(c => c.id);
            const data = channels.map(c => c.participantCount);
            
            // Generate some colors
            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'];

            if (channelParticipantsChartInstance) {
                channelParticipantsChartInstance.data.labels = labels;
                channelParticipantsChartInstance.data.datasets[0].data = data;
                channelParticipantsChartInstance.update();
            } else {
                channelParticipantsChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderWidth: 1,
                            borderColor: '#1e1e1e'
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#e0e0e0' } } } }
                });
            }
        }

        function renderTimeSeriesCharts(timeSeries) {
            if (!timeSeries) return;
            const labels = timeSeries.map(t => {
                const d = new Date(t.timestampMs);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });

            const bandwidthData = timeSeries.map(t => t.bytesTransferred);
            const pttData = timeSeries.map(t => t.pttStarts);
            const delaysData = timeSeries.map(t => t.slowConnections);

            const commonOptions = { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { 
                    x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                    y: { beginAtZero: true, ticks: { color: '#aaa' }, grid: { color: '#333' } } 
                }, 
                plugins: { legend: { display: false } } 
            };

            // Bandwidth Chart
            const ctxBandwidth = document.getElementById('bandwidthChart');
            if (bandwidthChartInstance) {
                bandwidthChartInstance.data.labels = labels;
                bandwidthChartInstance.data.datasets[0].data = bandwidthData;
                bandwidthChartInstance.update();
            } else if (ctxBandwidth) {
                bandwidthChartInstance = new Chart(ctxBandwidth, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{ data: bandwidthData, borderColor: '#36A2EB', backgroundColor: 'rgba(54, 162, 235, 0.2)', fill: true, tension: 0.4 }]
                    },
                    options: commonOptions
                });
            }

            // PTT Frequency Chart
            const ctxPtt = document.getElementById('pttFrequencyChart');
            if (pttFrequencyChartInstance) {
                pttFrequencyChartInstance.data.labels = labels;
                pttFrequencyChartInstance.data.datasets[0].data = pttData;
                pttFrequencyChartInstance.update();
            } else if (ctxPtt) {
                pttFrequencyChartInstance = new Chart(ctxPtt, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{ data: pttData, borderColor: '#4BC0C0', backgroundColor: 'rgba(75, 192, 192, 0.2)', fill: true, tension: 0.4 }]
                    },
                    options: commonOptions
                });
            }

            // Network Delays Chart
            const ctxDelays = document.getElementById('networkDelaysChart');
            if (networkDelaysChartInstance) {
                networkDelaysChartInstance.data.labels = labels;
                networkDelaysChartInstance.data.datasets[0].data = delaysData;
                networkDelaysChartInstance.update();
            } else if (ctxDelays) {
                networkDelaysChartInstance = new Chart(ctxDelays, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{ data: delaysData, backgroundColor: '#FF6384' }]
                    },
                    options: commonOptions
                });
            }
        }

        // Poll a cada 2 segundos
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>
</html>
