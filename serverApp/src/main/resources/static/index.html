<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTT-LAN Admin Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-color: #4C9EEB;
            --text-color: #E0E0E0;
            --text-muted: #9E9E9E;
            --success-color: #4CAF50;
            --speaking-color: #C77D4C;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .channels-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 20px;
        }

        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
        }

        .channel-count {
            background-color: #333;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .participant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: var(--success-color);
        }

        .status-dot.speaking {
            background-color: var(--speaking-color);
            box-shadow: 0 0 8px var(--speaking-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            background-color: var(--surface-color);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>PTT-LAN Admin Dashboard</h1>
        <div id="last-updated" style="color: var(--text-muted); font-size: 14px;">Atualizado: --:--:--</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="global-connections">0</div>
            <div class="stat-label">Conexões Globais</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="active-channels-count">0</div>
            <div class="stat-label">Canais Ativos</div>
        </div>
    </div>

    <h2>Canais Ativos</h2>
    <div id="channels-container" class="channels-container">
        <!-- Canais serão inseridos aqui via JS -->
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/admin/metrics', { cache: 'no-store' });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('global-connections').textContent = data.globalConnections;
                document.getElementById('active-channels-count').textContent = data.channels.length;
                
                const now = new Date();
                document.getElementById('last-updated').textContent = `Atualizado: ${now.toLocaleTimeString()}`;
                
                renderChannels(data.channels);
            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        function renderChannels(channels) {
            const container = document.getElementById('channels-container');
            
            if (channels.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum canal ativo no momento.</div>';
                return;
            }
            
            container.innerHTML = channels.map(channel => `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-name">Canal ${channel.id}</div>
                        <div class="channel-count">${channel.participantCount} users</div>
                    </div>
                    <ul class="participant-list">
                        ${channel.participants.map(p => `
                            <li class="participant-item">
                                <div class="status-dot ${p.isSpeaking ? 'speaking' : ''}"></div>
                                <span>${p.nickname}</span>
                                ${p.isSpeaking ? '<span style="margin-left: 8px; font-size: 12px; color: var(--speaking-color);">(Falando)</span>' : ''}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        // Poll a cada 2 segundos
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>
</html>
