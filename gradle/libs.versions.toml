[versions]
agp = "9.2.1"
kotlin = "2.4.0"
compose = "1.11.1"
ktor = "3.1.0"
sqldelight = "2.3.2"
koin = "4.1.0"
decompose = "3.3.0"
multiplatformSettings = "1.3.0"
kermit = "2.1.0"
coroutines = "1.10.0"
serialization = "1.8.0"
detekt = "1.23.8"
ktlint = "14.2.0"
kover = "0.10.0"
benManesVersions = "0.54.0"

[libraries]
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
plugin-agp = { module = "com.android.tools.build:gradle", version.ref = "agp" }
plugin-kotlin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
plugin-compose-compiler = { module = "org.jetbrains.kotlin:compose-compiler-gradle-plugin", version.ref = "kotlin" }
plugin-compose = { module = "org.jetbrains.compose:compose-gradle-plugin", version.ref = "compose" }
plugin-ktlint = { module = "org.jlleitschuh.gradle:ktlint-gradle", version.ref = "ktlint" }
plugin-detekt = { module = "io.gitlab.arturbosch.detekt:detekt-gradle-plugin", version.ref = "detekt" }

[plugins]
androidApplication = { id = "com.android.application" }
androidLibrary = { id = "com.android.library" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform" }
kotlinJvm = { id = "org.jetbrains.kotlin.jvm" }
composeMultiplatform = { id = "org.jetbrains.compose" }
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
sqldelight = { id = "app.cash.sqldelight", version.ref = "sqldelight" }
detekt = { id = "io.gitlab.arturbosch.detekt" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
benManesVersions = { id = "com.github.ben-manes.versions", version.ref = "benManesVersions" }
