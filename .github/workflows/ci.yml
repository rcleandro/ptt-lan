name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Detekt and Ktlint
        run: ./gradlew detekt ktlintCheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Unit Tests
        run: ./gradlew test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Android
        run: ./gradlew :androidApp:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Desktop (Ubuntu)
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS
      - name: Upload Desktop Installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Server Distribution
        run: ./gradlew :serverApp:distZip
      - name: Upload Server Distribution
        uses: actions/upload-artifact@v4
        with:
          name: server-distribution
          path: serverApp/build/distributions/*.zip

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: cd iosApp && xcodegen
      - name: Run iOS Simulator Unit Tests
        run: ./gradlew iosSimulatorArm64Test
      - name: Build iOS App
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug -sdk iphonesimulator -arch arm64 -derivedDataPath build build
      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: iosApp/build/Build/Products/Debug-iphonesimulator/*.app
